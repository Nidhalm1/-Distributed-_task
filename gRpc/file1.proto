syntax = "proto3";
package worker;
option go_package = "NVPROJET/Agent/gRpc";

message TaskRequest {
    int32 id = 1;
    string command = 2;
    repeated string args = 3;
    int64 createdAt = 4;
}
message Response {
    string output = 1;
    string error = 2;
    string status = 3;
}
service worker {
    rpc execute(TaskRequest) returns (Response);
}